<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UPLOADS – MAXIMAX MULTI SERVICES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0; background:#000; color:#ff7a00; font-family:system-ui, sans-serif;">

  <!-- UPLOADS SECTION FINAL (PA MANYEN ANKÒ) -->
  <section style="padding:70px 20px; text-align:center;">

    <h2 style="font-size:2.4rem; font-weight:900; margin-bottom:25px;">
      UPLOAD YOUR DOCUMENTS
    </h2>

    <p style="
      max-width:700px;
      margin:0 auto 40px;
      font-size:1.2rem;
      line-height:1.7;
      opacity:0.9;
    ">
      Chaje dokiman ou yo an sekirite. Nou resevwa foto, PDF, ak tout fichye
      administratif ou bezwen voye pou tretman PRO‑MAX.
    </p>

    <form action="#" method="POST" enctype="multipart/form-data" style="
      background:#111;
      padding:40px;
      max-width:600px;
      margin:0 auto;
      border:2px solid #ff7a00;
      border-radius:14px;
      text-align:left;
    ">

      <label style="font-weight:700; font-size:1.1rem;">Non ou:</label>
      <input type="text" name="fullname" required style="
        width:100%;
        padding:12px;
        margin:10px 0 20px;
        border-radius:8px;
        border:none;
      ">

      <label style="font-weight:700; font-size:1.1rem;">Imèl ou:</label>
      <input type="email" name="email" required style="
        width:100%;
        padding:12px;
        margin:10px 0 20px;
        border-radius:8px;
        border:none;
      ">

      <label style="font-weight:700; font-size:1.1rem;">Chwazi fichye ou:</label>
      <input type="file" name="file" required style="
        width:100%;
        padding:12px;
        margin:10px 0 30px;
        border-radius:8px;
        border:none;
        background:#222;
        color:#ff7a00;
      ">

      <button type="submit" style="
        width:100%;
        padding:15px;
        background:#ff7a00;
        color:#000;
        font-weight:900;
        border:none;
        border-radius:8px;
        font-size:1.2rem;
        cursor:pointer;
      ">
        UPLOAD NOW
      </button>

    </form>

  </section>

</body>
</html>
