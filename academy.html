<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRO-MAX AKADEMI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #ff6a00 50%, #000000 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      border: 2px solid #ff6a00;
      border-radius: 20px;
      background: rgba(0,0,0,0.75);
      box-shadow: 0 0 30px rgba(255,106,0,0.6);
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 42px;
      color: #ff8c00;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      color: #f5f5f5;
    }

    .progress-box {
      background: rgba(0,0,0,0.8);
      border: 1px solid #ff6a00;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .progress-title {
      margin-bottom: 10px;
      font-size: 18px;
      color: #ff8c00;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: #222;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff6a00, #ffb000);
      transition: 0.4s;
    }

    .chapters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .card {
      background: rgba(0,0,0,0.82);
      border: 1px solid #ff6a00;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 0 18px rgba(255,106,0,0.35);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 30px rgba(255,106,0,0.7);
    }

    .card h2 {
      color: #ff8c00;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .card p {
      font-size: 14px;
      line-height: 1.5;
      color: #ddd;
      margin-bottom: 18px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button, .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      background: #ff6a00;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
    }

    button:hover, .btn:hover {
      background: #ffb000;
    }

    .completed {
      background: #111;
      color: #ff8c00;
      border: 1px solid #ff6a00;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding: 25px;
      background: rgba(0,0,0,0.85);
      border-radius: 15px;
      border: 1px solid #ff6a00;
    }

    footer h2 {
      color: #ff8c00;
      margin-bottom: 10px;
    }

    footer p {
      color: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">

    <header>
      <h1>PRO-MAX AKADEMI</h1>
      <p>Sant Fòmasyon Ofisyèl PRO-MAX BSS1815 DMP</p>
      <p>JERE • KOMINIKE • ÒGANIZE • INOVE</p>
    </header>

    <section class="progress-box">
      <div class="progress-title">Pwogrè Fòmasyon Ou</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText">0% Complete</p>
    </section>

    <section class="chapters" id="chapters"></section>

    <footer>
      <h2>DEVAN DEVAN NÈT.</h2>
      <p>BATI POU JODI A. PARE POU DEMEN.</p>
      <p>briyantsoley1815-site.netlify.app</p>
    </footer>

  </div>

  <script>
    const chapters = [
      {
        title: "Chapit 1",
        name: "Kisa PRO-MAX BSS1815 DMP ye?",
        desc: "Max Louis prezante vizyon jeneral platfòm dijital la."
      },
      {
        title: "Chapit 2",
        name: "Admin Dashboard & Security",
        desc: "Cange eksplike kijan administrasyon, sekirite ak pèmisyon fonksyone."
      },
      {
        title: "Chapit 3",
        name: "Leadership & Coordination",
        desc: "Vice-Prezidan Tatane prezante lidèchip ak kowòdinasyon."
      },
      {
        title: "Chapit 4",
        name: "Financial Management",
        desc: "Jij Mayan montre kijan finans, rapò ak transparans jere."
      },
      {
        title: "Chapit 5",
        name: "Document Center",
        desc: "Sonsonn prezante dokiman, achiv ak dosye ofisyèl yo."
      },
      {
        title: "Chapit 6",
        name: "Communication Center",
        desc: "Roro Lajan montre kijan kominikasyon kenbe ekip la konekte."
      },
      {
        title: "Chapit 7",
        name: "Training & Education",
        desc: "Montina Le Professeur eksplike fòmasyon ak sipò itilizatè yo."
      },
      {
        title: "Chapit 8",
        name: "Vision & Strategy",
        desc: "Ti La France prezante vizyon ak estrateji PRO-MAX la."
      },
      {
        title: "Chapit 9",
        name: "Digital Registry",
        desc: "Paul Ema prezante enskripsyon, rekritman ak jesyon manm yo."
      },
      {
        title: "Chapit 10",
        name: "Motivation & Team Culture",
        desc: "Valery prezante motivasyon, kolaborasyon ak lespri ekip."
      },
      {
        title: "Final Chapter",
        name: "Platform Reveal",
        desc: "Max Louis fè gwo konklizyon ak lansman ofisyèl platfòm la."
      }
    ];

    const chaptersContainer = document.getElementById("chapters");

    chapters.forEach((chapter, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${chapter.title}</h2>
        <h3>${chapter.name}</h3>
        <p>${chapter.desc}</p>
        <div class="buttons">
          <a class="btn" href="#">▶ Gade Video</a>
          <a class="btn" href="#">📄 Rezime</a>
          <button onclick="markComplete(${index})">✅ Complete</button>
        </div>
      `;

      chaptersContainer.appendChild(card);
    });

    function markComplete(index) {
      localStorage.setItem("chapter_" + index, "complete");
      updateProgress();
    }

    function updateProgress() {
      let completed = 0;

      chapters.forEach((_, index) => {
        if (localStorage.getItem("chapter_" + index) === "complete") {
          completed++;
        }
      });

      const percent = Math.round((completed / chapters.length) * 100);

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressText").innerText = percent + "% Complete";
    }

    updateProgress();
  </script>
</body>
</html>
